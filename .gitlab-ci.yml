
# ─── VARIABLES GLOBALES ──────────────────────────────────
variables:
  REGISTRY: $CI_REGISTRY_IMAGE

# ─── STAGES ──────────────────────────────────────────────
stages:
  - lint
  - test
  - build
  - deploy

# ─── CACHE ───────────────────────────────────────────────
.laravel-cache: &laravel-cache
  cache:
    key: "${CI_JOB_NAME}-${CI_COMMIT_REF_SLUG}"
    paths:
      - services/${SERVICE_NAME}/vendor/

.node-cache: &node-cache
  cache:
    key: "node-${CI_COMMIT_REF_SLUG}"
    paths:
      - frontend/node_modules/

# ─── TEMPLATES ───────────────────────────────────────────
.laravel-base:
  image: php:8.4-cli
  before_script:
    - apt-get update -qq && apt-get install -y -qq git unzip libsqlite3-dev > /dev/null
    - docker-php-ext-install pdo pdo_sqlite bcmath > /dev/null 2>&1
    - curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer > /dev/null
    - cd services/$SERVICE_NAME
    - composer install --no-interaction --prefer-dist --quiet
    - cp .env.example .env
    - php artisan key:generate --quiet

.node-base:
  image: node:20-alpine
  before_script:
    - cd frontend
    - npm ci --silent

.ssh-base:
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | ssh-add -
    - mkdir -p ~/.ssh
    - echo "$SSH_KNOWN_HOSTS" >> ~/.ssh/known_hosts

# ═══════════════════════════════════════════════════════════
# STAGE 1 : LINT
# ═══════════════════════════════════════════════════════════

lint:auth:
  extends: .laravel-base
  stage: lint
  variables:
    SERVICE_NAME: auth-service
  <<: *laravel-cache
  script:
    - vendor/bin/pint --test
  rules:
    - changes:
        - services/auth-service/**/*

lint:employee:
  extends: .laravel-base
  stage: lint
  variables:
    SERVICE_NAME: employee-service
  <<: *laravel-cache
  script:
    - vendor/bin/pint --test
  rules:
    - changes:
        - services/employee-service/**/*

lint:pointage:
  extends: .laravel-base
  stage: lint
  variables:
    SERVICE_NAME: pointage-service
  <<: *laravel-cache
  script:
    - vendor/bin/pint --test
  rules:
    - changes:
        - services/pointage-service/**/*

lint:analytics:
  extends: .laravel-base
  stage: lint
  variables:
    SERVICE_NAME: analytics-service
  <<: *laravel-cache
  script:
    - vendor/bin/pint --test
  rules:
    - changes:
        - services/analytics-service/**/*

lint:notif:
  extends: .laravel-base
  stage: lint
  variables:
    SERVICE_NAME: notif-service
  <<: *laravel-cache
  script:
    - vendor/bin/pint --test
  rules:
    - changes:
        - services/notif-service/**/*

lint:frontend:
  extends: .node-base
  stage: lint
  <<: *node-cache
  script:
    - npx eslint .
  rules:
    - changes:
        - frontend/**/*

# ═══════════════════════════════════════════════════════════
# STAGE 2 : TEST
# ═══════════════════════════════════════════════════════════

test:auth:
