user www-data;
worker_processes auto;
pid /var/run/nginx.pid;

events { 
    worker_connections 1024;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Rediriger les logs vers la sortie standard pour Docker
    access_log /dev/stdout;
    error_log /dev/stderr warn;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Sécurité
    server_tokens off;
    client_max_body_size 50M; # Ajustez selon vos besoins d'upload

    # Compression Gzip pour les performances
    gzip on;
    gzip_proxied any;
    gzip_types text/plain application/xml text/css text/js text/xml application/x-javascript text/javascript application/json application/javascript image/svg+xml;
    gzip_vary on;
    gzip_disable "msie6";

    server {
        listen 80;
        server_name _; # Accepte tous les noms de domaine/IP

        root /var/www/html/public;
        index index.php index.html;

        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        # Cache navigateur pour les fichiers statiques
        location ~* \.(jpg|jpeg|gif|png|webp|svg|css|js|ico|xml|woff|woff2|ttf|eot)$ {
            access_log off;
            log_not_found off;
            expires max;
            add_header Cache-Control "public, no-transform";
        }

        # Traitement PHP
        location ~ \.php$ {
            try_files $uri =404; # Empêche l'exécution de scripts inexistants
            include fastcgi_params;
            fastcgi_pass unix:/var/run/php-fpm.sock;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_index index.php;
            
            # Optimisation des buffers
            fastcgi_buffer_size 32k;
            fastcgi_buffers 8 32k;
        }

        # Sécurité : Bloquer l'accès aux fichiers/dossiers cachés (.env, .git...)
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
}