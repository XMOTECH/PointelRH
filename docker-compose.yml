# La mention 'version' est désormais obsolète dans les versions récentes de Docker Compose
name: plateforme-rh

networks:
  pointel_net:
    driver: bridge

volumes:
  auth_db_data:
  redis_data:
  employee_db_data:
  pointage_db_data:
  notif_db_data:
  analytics_db_data:
  rabbitmq_data:


services:

  # ─── AUTH SERVICE ─────────────────────────────────────────
  auth-service:   
    build:
      context: ./services/auth-service   
      dockerfile: Dockerfile
    container_name: auth-service
    restart: unless-stopped
    volumes:
      - ./services/auth-service:/var/www/html
      - /var/www/html/vendor
      - /var/www/html/bootstrap/cache
      - ./services/auth-service/docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./services/auth-service/docker/supervisord.conf:/etc/supervisord.conf:ro
    environment:
      - DB_HOST=auth-db
      - DB_DATABASE=auth_db
      - DB_USERNAME=auth_user
      - DB_PASSWORD=auth_pass
      - REDIS_HOST=redis
      - JWT_SECRET=${JWT_SECRET}  
    depends_on:
      auth-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - pointel_net

  # ─── DATABASE ─────────────────────────────────────────────
  auth-db:
    image: mysql:8.0
    container_name: auth-db
    command: --skip-name-resolve
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: auth_db
      MYSQL_USER: auth_user
      MYSQL_PASSWORD: auth_pass
      MYSQL_ROOT_PASSWORD: root_pass
    volumes:
      - auth_db_data:/var/lib/mysql   
    networks:
      - pointel_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── REDIS ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - pointel_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── EMPLOYEE SERVICE ────────────────────────────────────
  employee-service:
    build:
      context: ./services/employee-service
      dockerfile: Dockerfile
    container_name: employee-service
    restart: unless-stopped
    volumes:
      - ./services/employee-service:/var/www/html
      - /var/www/html/vendor
      - /var/www/html/bootstrap/cache
      - ./services/employee-service/docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./services/employee-service/docker/supervisord.conf:/etc/supervisor/conf.d/supervisord.conf:ro
    environment:
      - DB_HOST=employee-db
      - DB_DATABASE=employee_db
      - DB_USERNAME=emp_user
      - DB_PASSWORD=emp_pass
      - REDIS_HOST=redis
      - AUTH_SERVICE_URL=http://auth-service/api/auth/verify
    depends_on:
      - employee-db
      - redis
    networks:
      - pointel_net

  employee-db:
    image: mysql:8.0
    container_name: employee-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: employee_db
      MYSQL_USER: emp_user
      MYSQL_PASSWORD: emp_pass
      MYSQL_ROOT_PASSWORD: root_pass
    volumes:
      - employee_db_data:/var/lib/mysql
    networks:
      - pointel_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── POINTAGE SERVICE ────────────────────────────────────
  pointage-service:
    build:
      context: ./services/pointage-service
      dockerfile: Dockerfile
    container_name: pointage-service
    restart: unless-stopped
    volumes:
      - ./services/pointage-service:/var/www/html
      - /var/www/html/vendor
      - /var/www/html/bootstrap/cache
      - ./services/pointage-service/docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./services/pointage-service/docker/supervisord.conf:/etc/supervisor/conf.d/supervisord.conf:ro
    environment:
      - DB_HOST=pointage-db
      - DB_DATABASE=pointage_db
      - DB_USERNAME=pt_user
      - DB_PASSWORD=pt_pass
      - REDIS_HOST=redis
      - AUTH_SERVICE_URL=http://auth-service/api/auth/verify
      - EMPLOYEE_SERVICE_URL=http://employee-service/api
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=pointel
      - RABBITMQ_PASSWORD=pointel_pass
    depends_on:
      - pointage-db
      - redis
      - rabbitmq
    networks:
      - pointel_net

  pointage-db:
    image: mysql:8.0
    container_name: pointage-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: pointage_db
      MYSQL_USER: pt_user
      MYSQL_PASSWORD: pt_pass
      MYSQL_ROOT_PASSWORD: root_pass
    volumes:
      - pointage_db_data:/var/lib/mysql
    networks:
      - pointel_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── RABBITMQ ─────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=pointel
      - RABBITMQ_DEFAULT_PASS=pointel_pass
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - pointel_net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ─── NOTIFICATION SERVICE ────────────────────────────────
  notif-service:
    build:
      context: ./services/notif-service
      dockerfile: Dockerfile
    container_name: notif-service
    restart: unless-stopped
    volumes:
      - ./services/notif-service:/var/www/html
      - /var/www/html/vendor
      - /var/www/html/bootstrap/cache
      - ./services/notif-service/docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./services/notif-service/docker/supervisord.conf:/etc/supervisor/conf.d/supervisord.conf:ro
    environment:
      - DB_HOST=notif-db
      - DB_DATABASE=notif_db
      - DB_USERNAME=notif_user
      - DB_PASSWORD=notif_pass
      - REDIS_HOST=redis
      - AUTH_SERVICE_URL=http://auth-service/api/auth/verify
      - EMPLOYEE_SERVICE_URL=http://employee-service/api
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_USER=pointel
      - RABBITMQ_PASSWORD=pointel_pass
      - RABBITMQ_QUEUE=pointel.notifications
    depends_on:
      - notif-db
      - redis
      - rabbitmq
    networks:
      - pointel_net

  notif-db:
    image: mysql:8.0
    container_name: notif-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: notif_db
      MYSQL_USER: notif_user
      MYSQL_PASSWORD: notif_pass
      MYSQL_ROOT_PASSWORD: root_pass
    volumes:
      - notif_db_data:/var/lib/mysql
    networks:
      - pointel_net

  # ─── ANALYTICS SERVICE ──────────────────────────────────
  analytics-service:
    build:
      context: ./services/analytics-service
      dockerfile: Dockerfile
    container_name: analytics-service
    restart: unless-stopped
    volumes:
      - ./services/analytics-service:/var/www/html
      - /var/www/html/vendor
      - /var/www/html/bootstrap/cache
      - ./services/analytics-service/docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./services/analytics-service/docker/supervisord.conf:/etc/supervisor/conf.d/supervisord.conf:ro
    environment:
      - DB_CONNECTION=pgsql
      - DB_HOST=analytics-db
      - DB_DATABASE=analytics_db
      - DB_USERNAME=ana_user
      - DB_PASSWORD=ana_pass
      - REDIS_HOST=redis
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_USER=pointel
      - RABBITMQ_PASSWORD=pointel_pass
      - RABBITMQ_QUEUE=pointel.analytics
    depends_on:
      - analytics-db
      - redis
      - rabbitmq
    networks:
      - pointel_net

  # ─── KONG API GATEWAY ──────────────────────────────────
  kong:
    image: kong:3.6
    container_name: kong
    ports:
      - "8000:8000"    # API publique — React pointe ici
      - "8001:8001"    # Admin API — localhost seulement
    environment:
      KONG_DATABASE: "off"             # Mode declaratif — pas de DB Kong
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
      KONG_PROXY_LISTEN: 0.0.0.0:8000
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_LOG_LEVEL: info
    volumes:
      - ./kong/kong.yml:/etc/kong/kong.yml:ro
    depends_on:
      - auth-service
      - employee-service
      - pointage-service
      - notif-service
      - analytics-service
    networks:
      - pointel_net

  analytics-db:
    image: postgres:alpine
    container_name: analytics-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: analytics_db
      POSTGRES_USER: ana_user
      POSTGRES_PASSWORD: ana_pass
    volumes:
      - analytics_db_data:/var/lib/postgresql
    networks:
      - pointel_net
