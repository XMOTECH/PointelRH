# La mention 'version' est désormais obsolète dans les versions récentes de Docker Compose
name: plateforme-rh

networks:
  Pointel:
    driver: bridge

volumes:
  auth_db_data:
  redis_data:
  employee_db_data:

services:

  # ─── AUTH SERVICE ─────────────────────────────────────────
  auth-service:   
    build:
      context: ./services/auth-service   
      dockerfile: Dockerfile
    container_name: auth-service
    restart: unless-stopped
    ports:
      - "8001:80"
    volumes:
      - ./services/auth-service:/var/www/html
    environment:
      - DB_HOST=auth_db
      - DB_DATABASE=auth_db
      - DB_USERNAME=auth_user
      - DB_PASSWORD=auth_pass
      - REDIS_HOST=redis
      - JWT_SECRET=${JWT_SECRET}  
    depends_on:
      auth_db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - Pointel

  # ─── DATABASE ─────────────────────────────────────────────
  auth_db:
    image: mysql:8.0
    container_name: auth_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: auth_db
      MYSQL_USER: auth_user
      MYSQL_PASSWORD: auth_pass
      MYSQL_ROOT_PASSWORD: root_pass
    volumes:
      - auth_db_data:/var/lib/mysql   
    networks:
      - Pointel
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── REDIS ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - Pointel
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── EMPLOYEE SERVICE ────────────────────────────────────
  employee-service:
    build:
      context: ./services/employee-service
      dockerfile: Dockerfile
    container_name: employee_service
    restart: unless-stopped
    ports:
      - "8002:80"
    volumes:
      - ./services/employee-service:/var/www/html
    environment:
      - DB_HOST=employee_db
      - DB_DATABASE=employee_db
      - DB_USERNAME=emp_user
      - DB_PASSWORD=emp_pass
      - REDIS_HOST=redis
      - AUTH_SERVICE_URL=http://auth-service/api/auth/verify
    depends_on:
      - employee_db
      - redis
    networks:
      - Pointel
 
  employee_db:
    image: mysql:8.0
    container_name: employee_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: employee_db
      MYSQL_USER: emp_user
      MYSQL_PASSWORD: emp_pass
      MYSQL_ROOT_PASSWORD: root_pass
    volumes:
      - employee_db_data:/var/lib/mysql
    networks:
      - Pointel
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

